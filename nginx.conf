server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # health endpoint (matches old Caddy `respond /health 200`)
    location = /health {
        return 200;
        access_log off;
    }

    # don't leak dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # try exact file, then .html, then dir index, then SPA fallback —
    # same precedence as the railpack Caddyfile's try_files.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }
}
